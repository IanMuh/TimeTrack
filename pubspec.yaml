name: timetrack
description: A personal offline-first time tracking app for Windows and Android.
publish_to: "none"
version: 0.2.0-pre+2

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.9
  fl_chart: ^0.68.0
  intl: 0.20.2
  http: ^1.6.0
  path: ^1.9.1
  package_info_plus: ^9.0.0
  path_provider: ^2.1.5
  file_selector: ^1.1.0
  sqlite3_flutter_libs: ^0.5.42
  sqflite: ^2.4.3
  sqflite_common_ffi: ^2.4.2
  supabase_flutter: ^2.14.2
  url_launcher: ^6.3.2
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  generate: true
  uses-material-design: true

hooks:
  user_defines:
    sqlite3:
      source: system
      name_windows: winsqlite3
      name: sqlite3
