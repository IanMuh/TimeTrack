name: timetrack
description: A personal offline-first time tracking app for Windows and Android.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  fl_chart: ^0.68.0
  intl: any
  path: ^1.9.0
  path_provider: ^2.1.4
  sqlite3_flutter_libs: ^0.5.24
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.3
  supabase_flutter: ^2.6.0
  uuid: ^4.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

hooks:
  user_defines:
    sqlite3:
      source: system
      name_windows: winsqlite3
      name: sqlite3
